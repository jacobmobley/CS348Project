<section class="mx-auto w-full max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
  <header class="mb-8">
    <div class="space-y-1">
      <h1 class="text-3xl font-bold tracking-tight text-slate-900">Maintenance Records</h1>
      <p class="text-sm text-slate-600">Track services and repairs for your vehicles in one place.</p>
    </div>
  </header>

  <div class="mb-4 flex flex-col gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:flex-row sm:items-center sm:justify-between">
    <div class="relative w-full sm:max-w-sm">
      <input
        type="text"
        placeholder="Search records..."
        class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 placeholder:text-slate-400 focus:border-slate-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-200"
        disabled
      />
    </div>
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="inline-flex items-center rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
        disabled
      >
        Filters
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50"
        disabled
      >
        Add Record
      </button>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm ring-1 ring-slate-200/50">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
          <tr>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Date</th>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Vehicle</th>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Service</th>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Odometer</th>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Cost</th>
            <th class="whitespace-nowrap px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Notes</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100 bg-white">
          <tr>
            <td colspan="6" class="px-5 py-14 text-center">
              <div class="mx-auto flex max-w-sm flex-col items-center gap-2">
                <div class="rounded-full bg-slate-100 p-3 text-slate-500">
                  <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 6h6M9 10h6M7 3h10a2 2 0 0 1 2 2v14l-3-2-2 2-2-2-2 2-2-2-3 2V5a2 2 0 0 1 2-2Z"/>
                  </svg>
                </div>
                <p class="text-sm font-medium text-slate-700">No records yet</p>
                <p class="text-xs text-slate-500">Records you add will appear in this table.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
